<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1.0">
  <title>PiAI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 480px;
      height: 320px;
      overflow: hidden;
      background: #0a0a0f;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      user-select: none;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 12px 16px 10px;
    }

    /* ── Header ── */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    #logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      color: #6ee7f7;
    }

    #status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      background: #1a1a2e;
      color: #888;
      transition: all 0.3s ease;
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #444;
      transition: background 0.3s ease;
    }

    /* ── Main content ── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
      text-align: center;
    }

    /* ── Idle state ── */
    #idle-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    #clock {
      font-size: 48px;
      font-weight: 200;
      color: #e8e8e8;
      letter-spacing: 2px;
      line-height: 1;
    }

    #date {
      font-size: 14px;
      color: #555;
      letter-spacing: 1px;
    }

    #wake-hint {
      margin-top: 12px;
      font-size: 12px;
      color: #333;
      letter-spacing: 1px;
    }

    /* ── Weather widget (idle) ── */
    #weather-widget {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
      padding: 6px 14px;
      background: #111118;
      border: 1px solid #1e1e2e;
      border-radius: 12px;
      min-width: 180px;
      justify-content: center;
    }

    #weather-temp {
      font-size: 22px;
      font-weight: 300;
      color: #e8e8e8;
    }

    #weather-icon {
      font-size: 22px;
      line-height: 1;
    }

    #weather-detail {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    #weather-desc {
      font-size: 11px;
      color: #666;
      text-transform: capitalize;
    }

    #weather-city {
      font-size: 10px;
      color: #444;
    }

    /* ── Listening state ── */
    #listen-view {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #waveform {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 50px;
    }

    .wave-bar {
      width: 5px;
      border-radius: 3px;
      background: #6ee7f7;
      animation: wave 1s ease-in-out infinite;
    }

    .wave-bar:nth-child(1)  { animation-delay: 0.0s; }
    .wave-bar:nth-child(2)  { animation-delay: 0.1s; }
    .wave-bar:nth-child(3)  { animation-delay: 0.2s; }
    .wave-bar:nth-child(4)  { animation-delay: 0.3s; }
    .wave-bar:nth-child(5)  { animation-delay: 0.4s; }
    .wave-bar:nth-child(6)  { animation-delay: 0.3s; }
    .wave-bar:nth-child(7)  { animation-delay: 0.2s; }
    .wave-bar:nth-child(8)  { animation-delay: 0.1s; }
    .wave-bar:nth-child(9)  { animation-delay: 0.0s; }

    @keyframes wave {
      0%, 100% { height: 10px; opacity: 0.4; }
      50%       { height: 44px; opacity: 1.0; }
    }

    #listen-label {
      font-size: 14px;
      color: #6ee7f7;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── Thinking state ── */
    #think-view {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    #spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #1a1a2e;
      border-top: 3px solid #a78bfa;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #user-text {
      font-size: 15px;
      color: #aaa;
      font-style: italic;
      max-width: 420px;
      line-height: 1.4;
    }

    /* ── Speaking state ── */
    #speak-view {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    #user-said {
      font-size: 12px;
      color: #444;
      font-style: italic;
      max-width: 440px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    #response-text {
      font-size: 16px;
      color: #e8e8e8;
      max-width: 440px;
      line-height: 1.5;
      max-height: 180px;
      overflow: hidden;
      text-align: center;
    }

    #speak-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .speak-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #a78bfa;
      animation: bounce 0.8s ease-in-out infinite;
    }
    .speak-dot:nth-child(2) { animation-delay: 0.15s; }
    .speak-dot:nth-child(3) { animation-delay: 0.30s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50%       { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Footer ── */
    #footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      padding-top: 6px;
      border-top: 1px solid #111;
    }

    #footer-clock {
      font-size: 12px;
      color: #333;
    }

    #connection-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #1f5c1f;
      transition: background 0.3s;
    }
    #connection-dot.connected { background: #22c55e; }
    #connection-dot.error     { background: #ef4444; }

    /* ── State colours ── */
    body.listening #status-dot  { background: #6ee7f7; box-shadow: 0 0 6px #6ee7f7; }
    body.listening #status-badge { color: #6ee7f7; background: #0d2b30; }

    body.thinking #status-dot   { background: #a78bfa; box-shadow: 0 0 6px #a78bfa; }
    body.thinking #status-badge  { color: #a78bfa; background: #1a1230; }

    body.speaking #status-dot   { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
    body.speaking #status-badge  { color: #4ade80; background: #0d2b1a; }
  </style>
</head>
<body class="idle">
<div id="app">

  <!-- Header -->
  <div id="header">
    <div id="logo">PiAI</div>
    <div id="status-badge">
      <div id="status-dot"></div>
      <span id="status-text">Idle</span>
    </div>
  </div>

  <!-- Main content -->
  <div id="content">

    <!-- Idle -->
    <div id="idle-view">
      <div id="clock">00:00</div>
      <div id="date">Loading...</div>
      <div id="weather-widget" style="display:none">
        <div id="weather-icon">🌡</div>
        <div id="weather-temp">--°</div>
        <div id="weather-detail">
          <div id="weather-desc">--</div>
          <div id="weather-city">--</div>
        </div>
      </div>
      <div id="wake-hint">Say "Hey Pi" to start</div>
    </div>

    <!-- Listening -->
    <div id="listen-view">
      <div id="waveform">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      <div id="listen-label">Listening...</div>
    </div>

    <!-- Thinking -->
    <div id="think-view">
      <div id="spinner"></div>
      <div id="user-text">"..."</div>
    </div>

    <!-- Speaking -->
    <div id="speak-view">
      <div id="user-said"></div>
      <div id="response-text"></div>
      <div id="speak-indicator">
        <div class="speak-dot"></div>
        <div class="speak-dot"></div>
        <div class="speak-dot"></div>
      </div>
    </div>

  </div>

  <!-- Footer -->
  <div id="footer">
    <div id="footer-clock">--:-- --</div>
    <a href="/debug.html" target="_blank" style="font-size:10px;color:#333;text-decoration:none;letter-spacing:1px;" onmouseover="this.style.color='#6ee7f7'" onmouseout="this.style.color='#333'">debug</a>
    <div id="connection-dot" title="Server connection"></div>
  </div>

</div>

<script>
  // ── Clock ──
  function updateClock() {
    const now = new Date();
    const h = now.getHours();
    const m = String(now.getMinutes()).padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    const timeStr = `${h12}:${m}`;
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const dateStr = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
    const footerStr = `${h12}:${m} ${ampm}`;

    document.getElementById('clock').textContent = timeStr;
    document.getElementById('date').textContent = dateStr;
    document.getElementById('footer-clock').textContent = footerStr;
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ── State machine ──
  const views = ['idle-view', 'listen-view', 'think-view', 'speak-view'];
  const stateMap = {
    idle:      { view: 'idle-view',   label: 'Idle',       class: 'idle'      },
    listening: { view: 'listen-view', label: 'Listening',  class: 'listening' },
    thinking:  { view: 'think-view',  label: 'Thinking',   class: 'thinking'  },
    speaking:  { view: 'speak-view',  label: 'Speaking',   class: 'speaking'  },
  };

  function setState(state, data = {}) {
    const cfg = stateMap[state] || stateMap.idle;

    // Swap view
    views.forEach(v => {
      document.getElementById(v).style.display = v === cfg.view ? 'flex' : 'none';
    });

    // Update badge
    document.getElementById('status-text').textContent = cfg.label;
    document.body.className = cfg.class;

    // Populate text fields
    if (state === 'thinking' && data.userText) {
      document.getElementById('user-text').textContent = `"${data.userText}"`;
    }
    if (state === 'speaking') {
      document.getElementById('user-said').textContent = data.userText ? `"${data.userText}"` : '';
      document.getElementById('response-text').textContent = data.aiText || '';
    }
  }

  setState('idle');

  // ── SSE connection ──
  const dot = document.getElementById('connection-dot');

  function connectSSE() {
    const es = new EventSource('/api/screen/events');

    es.onopen = () => {
      dot.className = 'connected';
    };

    es.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        setState(msg.state, msg);
      } catch {}
    };

    es.onerror = () => {
      dot.className = 'error';
      es.close();
      setTimeout(connectSSE, 3000); // reconnect
    };
  }

  connectSSE();

  // ── Weather widget ──
  const WEATHER_ICONS = {
    'clear sky': '☀️', 'few clouds': '🌤', 'scattered clouds': '⛅',
    'broken clouds': '☁️', 'overcast clouds': '☁️',
    'light rain': '🌦', 'moderate rain': '🌧', 'heavy intensity rain': '🌧',
    'light snow': '🌨', 'snow': '❄️', 'thunderstorm': '⛈',
    'mist': '🌫', 'fog': '🌫', 'haze': '🌫',
  };

  function weatherIcon(desc) {
    const lower = (desc || '').toLowerCase();
    for (const [key, icon] of Object.entries(WEATHER_ICONS)) {
      if (lower.includes(key)) return icon;
    }
    return '🌡';
  }

  async function fetchWeather() {
    try {
      const res = await fetch('/api/status');
      if (!res.ok) return;
      const data = await res.json();
      if (!data.weather) return;

      const w = data.weather;
      document.getElementById('weather-temp').textContent = `${w.temp}°`;
      document.getElementById('weather-desc').textContent = w.description;
      document.getElementById('weather-city').textContent = w.city;
      document.getElementById('weather-icon').textContent = weatherIcon(w.description);
      document.getElementById('weather-widget').style.display = 'flex';
    } catch (e) {}
  }

  fetchWeather();
  setInterval(fetchWeather, 5 * 60 * 1000); // refresh every 5 min
</script>
</body>
</html>
