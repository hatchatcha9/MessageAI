<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1.0">
  <title>frog</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --ground: #10160f;
      --surface: #1a2318;
      --hairline: #2a3524;
      --ink: #eef2e6;
      --muted: #7c8a72;
      --muted-2: #55604c;
      --accent: #9ee85a;
      --accent-ink: #16220c;
      --accent-2: #e8b64a;
      --water: #5fc9d1;
      --danger: #ef4444;
    }

    body {
      width: 480px;
      height: 320px;
      overflow: hidden;
      background: var(--ground);
      color: var(--ink);
      font-family: -apple-system, 'Segoe UI', 'Noto Sans', sans-serif;
      user-select: none;
    }

    /* ── Layout ── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding: 12px 16px 10px;
    }

    /* ── Header ── */
    #header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
    }

    #logo {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
    }

    #status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 20px;
      background: var(--surface);
      color: var(--muted);
      transition: all 0.3s ease;
    }

    #status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted-2);
      transition: background 0.3s ease;
    }

    /* ── Main content ── */
    #content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 10px;
      text-align: center;
    }

    /* ── Idle state ── */
    #idle-view {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
    }

    #clock {
      font-size: 44px;
      font-weight: 200;
      color: var(--ink);
      letter-spacing: 2px;
      line-height: 1;
      font-variant-numeric: tabular-nums;
    }

    #date {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    #wake-hint {
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted-2);
      letter-spacing: 1px;
    }

    /* ── Tap-to-speak button ── */
    #tap-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--hairline);
      cursor: pointer;
      margin-top: 6px;
      transition: background 0.15s, border-color 0.15s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }
    #tap-btn:active {
      background: #212c1d;
      border-color: var(--accent);
      transform: scale(0.93);
    }
    #tap-btn svg { width: 28px; height: 28px; color: var(--muted); }
    #tap-btn.triggered svg { color: var(--accent); }

    #last-response {
      margin-top: 4px;
      font-size: 12px;
      color: var(--muted);
      font-style: italic;
      max-width: 420px;
      text-align: center;
      line-height: 1.4;
      /* Collapsed by default — takes no layout space until text appears */
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      transition: opacity 1.5s ease, max-height 0.3s ease;
    }
    #last-response.visible {
      opacity: 1;
      max-height: 44px;
    }

    /* ── Weather widget (idle) ── */
    #weather-widget {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 4px;
      padding: 4px 12px;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: 12px;
      min-width: 160px;
      justify-content: center;
    }

    #weather-temp {
      font-size: 20px;
      font-weight: 300;
      color: var(--ink);
      font-variant-numeric: tabular-nums;
    }

    #weather-icon {
      font-size: 20px;
      line-height: 1;
    }

    #weather-detail {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    #weather-desc {
      font-size: 12px;
      color: var(--muted);
      text-transform: capitalize;
    }

    #weather-city {
      font-size: 11px;
      color: var(--muted-2);
    }

    /* ── Listening state ── */
    #listen-view {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
    }

    #waveform {
      display: flex;
      align-items: center;
      gap: 4px;
      height: 50px;
    }

    .wave-bar {
      width: 5px;
      border-radius: 3px;
      background: var(--accent);
      height: 8px;
      transition: height 0.08s ease-out, opacity 0.08s ease-out;
      opacity: 0.4;
    }

    #listen-label {
      font-size: 14px;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* ── Thinking state ── */
    #think-view {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    #spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--hairline);
      border-top: 3px solid var(--accent-2);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #user-text {
      font-size: 15px;
      color: var(--muted);
      font-style: italic;
      max-width: 420px;
      line-height: 1.4;
    }

    /* ── Speaking state ── */
    #speak-view {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      width: 100%;
    }

    #user-said {
      font-size: 12px;
      color: var(--muted-2);
      font-style: italic;
      max-width: 440px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    #response-text {
      font-size: 16px;
      color: var(--ink);
      max-width: 440px;
      line-height: 1.5;
      max-height: 180px;
      overflow: hidden;
      text-align: center;
    }

    #speak-indicator {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .speak-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--water);
      animation: bounce 0.8s ease-in-out infinite;
    }
    .speak-dot:nth-child(2) { animation-delay: 0.15s; }
    .speak-dot:nth-child(3) { animation-delay: 0.30s; }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); opacity: 0.4; }
      50%       { transform: translateY(-5px); opacity: 1; }
    }

    /* ── Footer ── */
    #footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-shrink: 0;
      padding-top: 6px;
      border-top: 1px solid var(--hairline);
    }

    #footer-clock {
      font-size: 12px;
      color: var(--muted-2);
      min-width: 54px;
      font-variant-numeric: tabular-nums;
    }

    #footer-nav {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .footer-nav-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 50px;
      height: 50px;
      color: var(--muted-2);
      text-decoration: none;
      border-radius: 10px;
      border: 1px solid var(--hairline);
      transition: color 0.15s, background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .footer-nav-btn:active { color: var(--accent); background: var(--surface); border-color: var(--accent); }
    .footer-nav-btn svg { width: 20px; height: 20px; }

    #connection-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #2c4020;
      transition: background 0.3s;
    }
    #connection-dot.connected { background: var(--accent); }
    #connection-dot.error     { background: var(--danger); }

    /* ── Battery indicator ── */
    #battery-indicator {
      display: none;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: var(--muted-2);
    }

    #battery-bar-wrap {
      position: relative;
      width: 22px;
      height: 11px;
      border: 1.5px solid var(--muted-2);
      border-radius: 2px;
    }
    #battery-bar-wrap::after {
      content: '';
      position: absolute;
      right: -4px;
      top: 50%;
      transform: translateY(-50%);
      width: 2.5px;
      height: 5px;
      background: var(--muted-2);
      border-radius: 0 1px 1px 0;
    }

    #battery-fill {
      height: 100%;
      border-radius: 1px;
      background: var(--accent);
      transition: width 0.5s ease, background 0.5s ease;
    }
    #battery-fill.low      { background: var(--danger); }
    #battery-fill.medium   { background: var(--accent-2); }
    #battery-fill.charging { background: var(--accent); }

    #battery-pct {
      font-size: 11px;
      color: var(--muted);
      min-width: 26px;
      font-variant-numeric: tabular-nums;
    }

    /* ── State colours ── */
    body.listening #status-dot  { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
    body.listening #status-badge { color: var(--accent); background: rgba(158,232,90,0.12); }

    body.thinking #status-dot   { background: var(--accent-2); box-shadow: 0 0 6px var(--accent-2); }
    body.thinking #status-badge  { color: var(--accent-2); background: rgba(232,182,74,0.12); }

    body.speaking #status-dot   { background: var(--water); box-shadow: 0 0 6px var(--water); }
    body.speaking #status-badge  { color: var(--water); background: rgba(95,201,209,0.12); }
  </style>
</head>
<body class="idle">
<div id="app">

  <!-- Header -->
  <div id="header">
    <div id="logo">frog</div>
    <div id="battery-indicator">
      <div id="battery-bar-wrap">

      <span id="status-text">Idle</span>
    </div>
  </div>

  <!-- Main content -->
  <div id="content">

    <!-- Idle -->
    <div id="idle-view">
      <div id="clock">00:00</div>
      <div id="date">Loading...</div>
      <div id="weather-widget" style="display:none">
        <div id="weather-icon">🌡</div>
        <div id="weather-temp">--°</div>
        <div id="weather-detail">
          <div id="weather-desc">--</div>

      </div>

    </div>

    <!-- Listening -->
    <div id="listen-view">
      <div id="waveform">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
      </div>
      <div id="listen-label">Listening...</div>
    </div>

    <!-- Thinking -->
    <div id="think-view">
      <div id="spinner"></div>
      <div id="user-text">"..."</div>
    </div>

    <!-- Speaking -->
    <div id="speak-view">
      <div id="user-said"></div>
      <div id="response-text"></div>
      <div id="speak-indicator">
        <div class="speak-dot"></div>
        <div class="speak-dot"></div>

  </div>

  <!-- Footer -->
  <div id="footer">
    <div id="footer-clock">--:-- --</div>
    <div id="footer-nav">
      <!-- Mic / Stop button — always visible, changes function by state -->
      <div id="tap-btn" class="footer-nav-btn" title="Tap to speak">
        <svg id="tap-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">

          <rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor" stroke="none"></rect>

      </div>
      <!-- Calendar -->
      <a class="footer-nav-btn" href="/calendar.html" title="Calendar">

      <a class="footer-nav-btn" href="/spotify.html" title="Spotify">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="6.5"></circle>
          <path d="M4.5 6.5c2.5-1 4.5-1 7 0M4.8 8.7c2-.8 3.6-.8 5.6 0M5.2 10.7c1.6-.6 2.8-.6 4.4 0" stroke-linecap="round"></path>

          <path d="M3 1.5v5a1.5 1.5 0 0 0 1.5 1.5V14.5M3 1.5v3.5M5 1.5v3.5M3 5h2M9.5 1.5S8 3 8 5.5 9.5 9 9.5 9V14.5"></path>
        </svg>

      <!-- Settings -->
      <a class="footer-nav-btn" href="/settings.html" title="Settings">
        <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="8" cy="8" r="2.5"></circle>
          <path d="M8 1.5v1M8 13.5v1M1.5 8h1M13.5 8h1M3.4 3.4l.7.7M11.9 11.9l.7.7M3.4 12.6l.7-.7M11.9 4.1l.7-.7"></path>
        </svg>
      </a>
    </div>
    <div id="connection-dot" title="Server connection"></div>
  </div>

</div>

<script>
  // ── Clock ──
  function updateClock() {
    const now = new Date();
    const h = now.getHours();
    const m = String(now.getMinutes()).padStart(2, '0');
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    const timeStr = `${h12}:${m}`;
    const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    const dateStr = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
    const footerStr = `${h12}:${m} ${ampm}`;

    document.getElementById('clock').textContent = timeStr;
    document.getElementById('date').textContent = dateStr;
    document.getElementById('footer-clock').textContent = footerStr;
  }
  updateClock();
  setInterval(updateClock, 10000);

  // ── State machine ──
  const views = ['idle-view', 'listen-view', 'think-view', 'speak-view'];
  const stateMap = {
    idle:      { view: 'idle-view',   label: 'Idle',       class: 'idle'      },
    listening: { view: 'listen-view', label: 'Listening',  class: 'listening' },
    thinking:  { view: 'think-view',  label: 'Thinking',   class: 'thinking'  },
    speaking:  { view: 'speak-view',  label: 'Speaking',   class: 'speaking'  },
  };

  let _lastResponseText = '';
  let _lastResponseTimer = null;

  function showLastResponse(text) {
    const el = document.getElementById('last-response');
    if (!text) return;
    _lastResponseText = text;
    el.textContent = text;
    el.classList.add('visible');
    if (_lastResponseTimer) clearTimeout(_lastResponseTimer);
    // Fade out after 30s
    _lastResponseTimer = setTimeout(() => {
      el.classList.remove('visible');
    }, 30000);
  }

  function setState(state, data = {}) {
    const cfg = stateMap[state] || stateMap.idle;

    // Swap view
    views.forEach(v => {
      document.getElementById(v).style.display = v === cfg.view ? 'flex' : 'none';
    });

    // Update badge
    document.getElementById('status-text').textContent = cfg.label;
    document.body.className = cfg.class;

    // Populate text fields
    if (state === 'thinking' && data.userText) {
      document.getElementById('user-text').textContent = `"${data.userText}"`;
    }
    if (state === 'speaking') {
      document.getElementById('user-said').textContent = data.userText ? `"${data.userText}"` : '';
      document.getElementById('response-text').textContent = data.aiText || '';
    }
    // When returning to idle, show the last response faded below the clock
    if (state === 'idle' && data.aiText) {
      showLastResponse(data.aiText);
    }
  }

  setState('idle');

  // ── SSE connection ──
  const dot = document.getElementById('connection-dot');

  function connectSSE() {
    const es = new EventSource('/api/screen/events');

    es.onopen = () => {
      dot.className = 'connected';
    };

    es.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.state === 'rms') { updateWaveform(msg.rms); return; }
        setState(msg.state, msg);
      } catch {}
    };

    es.onerror = () => {
      dot.className = 'error';
      es.close();
      setTimeout(connectSSE, 3000); // reconnect
    };
  }

  connectSSE();

  // ── Live waveform driven by real mic RMS ──
  const _waveBars = Array.from(document.querySelectorAll('.wave-bar'));
  // Per-bar random offsets so they don't all move identically
  const _barOffsets = _waveBars.map(() => (Math.random() - 0.5) * 0.3);

  function updateWaveform(rms) {
    if (_currentState !== 'listening') return;
    // Scale: ambient (~20) → 8px, loud speech (~1000) → 44px
    const base = Math.max(8, Math.min(44, 8 + (rms / 900) * 36));
    const baseOp = Math.max(0.3, Math.min(1.0, rms / 500));
    _waveBars.forEach((bar, i) => {
      const scale = 1 + _barOffsets[i] * (rms > 100 ? 1 : 0.2);
      const h = Math.max(4, Math.min(48, base * scale));
      bar.style.height = h + 'px';
      bar.style.opacity = baseOp;
    });
  }

  // ── Demo mode (preview.html sends postMessage) ──
  window.addEventListener('message', (e) => {
    if (e.data && e.data.type === 'demo-state') {
      setState(e.data.state, e.data);
    }
  });

  // ── Weather widget ──
  const WEATHER_ICONS = {
    'clear sky': '☀️', 'few clouds': '🌤', 'scattered clouds': '⛅',
    'broken clouds': '☁️', 'overcast clouds': '☁️',
    'light rain': '🌦', 'moderate rain': '🌧', 'heavy intensity rain': '🌧',
    'light snow': '🌨', 'snow': '❄️', 'thunderstorm': '⛈',
    'mist': '🌫', 'fog': '🌫', 'haze': '🌫',
  };

  function weatherIcon(desc) {
    const lower = (desc || '').toLowerCase();
    for (const [key, icon] of Object.entries(WEATHER_ICONS)) {
      if (lower.includes(key)) return icon;
    }
    return '🌡';
  }

  async function fetchStatus() {
    try {
      const res = await fetch('/api/status');
      if (!res.ok) return;
      const data = await res.json();

      // Weather
      if (data.weather) {
        const w = data.weather;
        document.getElementById('weather-temp').textContent = `${w.temp}°`;
        document.getElementById('weather-desc').textContent = w.description;
        document.getElementById('weather-city').textContent = w.city;
        document.getElementById('weather-icon').textContent = weatherIcon(w.description);
        document.getElementById('weather-widget').style.display = 'flex';
      }

      // Battery
      if (data.battery) {
        const b   = data.battery;
        const pct = Math.max(0, Math.min(100, b.percent));
        const fill = document.getElementById('battery-fill');
        fill.style.width = `${pct}%`;
        fill.className   = b.charging ? 'charging'
                         : pct <= 15  ? 'low'
                         : pct <= 40  ? 'medium'
                         : '';
        document.getElementById('battery-pct').textContent = `${pct}%`;
        document.getElementById('battery-indicator').style.display = 'flex';
      }
    } catch (e) {}
  }

  fetchStatus();
  setInterval(fetchStatus, 30 * 1000); // refresh every 30s

  // ── Mic/Stop button ──
  // In idle/listening/thinking: acts as mic (triggers voice).
  // In speaking: acts as stop (cuts off TTS).
  let _currentState = 'idle';
  let _tapFromTouch = false;

  function _updateTapBtn(state) {
    _currentState = state;
    const tapIcon  = document.getElementById('tap-icon');
    const stopIcon = document.getElementById('stop-icon');
    const btn      = document.getElementById('tap-btn');
    if (state === 'speaking' || state === 'listening') {
      tapIcon.style.display  = 'none';
      stopIcon.style.display = '';
      btn.style.color = '#ef4444';
      btn.title = 'Tap to stop';
    } else {
      tapIcon.style.display  = '';
      stopIcon.style.display = 'none';
      btn.style.color = '';
      btn.title = 'Tap to speak';
    }
  }

  // Hook into setState to keep button in sync
  const _origSetState = setState;
  setState = function(state, data) {
    _origSetState(state, data);
    _updateTapBtn(state);
  };

  // Debounce — the resistive digitizer can register a single physical tap as two
  // rapid click events (contact bounce). Without this, a bounce queues a second
  // trigger server-side that silently fires later (e.g. right after the next response).
  let _lastTapAt = 0;

  async function _handleTap() {
    const now = Date.now();
    if (now - _lastTapAt < 600) return;
    _lastTapAt = now;

    // While thinking there's nothing to stop and nothing to (usefully) trigger yet —
    // queuing a trigger here would just fire late, opening the mic unprompted after
    // the response finishes. Ignore taps until we're listening/speaking/idle.
    if (_currentState === 'thinking') return;

    const btn = document.getElementById('tap-btn');
    btn.classList.add('triggered');
    try {
      if (_currentState === 'speaking' || _currentState === 'listening') {
        await fetch('/api/voice/stop', { method: 'POST' });
      } else {
        await fetch('/api/voice/trigger', { method: 'POST' });
      }
    } catch {}
    setTimeout(() => btn.classList.remove('triggered'), 400);
  }

  document.getElementById('tap-btn').addEventListener('touchstart', (e) => {
    e.preventDefault();
    _tapFromTouch = true;
    _handleTap();
  }, { passive: false });
  document.getElementById('tap-btn').addEventListener('touchmove',   () => { _tapFromTouch = false; }, { passive: true });
  document.getElementById('tap-btn').addEventListener('touchcancel', () => { _tapFromTouch = false; }, { passive: true });
  document.getElementById('tap-btn').addEventListener('click', () => {
    if (_tapFromTouch) { _tapFromTouch = false; return; }
    _handleTap();
  });
</script>
</body>
</html>
