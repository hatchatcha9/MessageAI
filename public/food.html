<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1.0">
  <title>frog — Food</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ground: #10160f;
      --surface: #1a2318;
      --hairline: #2a3524;
      --ink: #eef2e6;
      --muted: #7c8a72;
      --muted-2: #55604c;
      --accent: #9ee85a;
      --accent-ink: #16220c;
      --accent-2: #e8b64a;
    }

    body {
      width: 480px;
      height: 320px;
      background: var(--ground);
      color: var(--ink);
      font-family: -apple-system, 'Segoe UI', 'Noto Sans', sans-serif;
      font-size: 14px;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 14px;
      background: #151d13;
      border-bottom: 1px solid var(--hairline);
      flex-shrink: 0;
    }

    #back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 12px 8px;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
    }
    #back-btn:active { opacity: 0.6; }
    #back-btn svg { width: 18px; height: 18px; }

    #top-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }

    #cart-btn {
      position: relative;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      background: none;
      border: none;
      -webkit-tap-highlight-color: transparent;
    }
    #cart-btn svg { width: 19px; height: 19px; }
    #cart-badge {
      display: none;
      position: absolute;
      top: 4px; right: 2px;
      min-width: 15px; height: 15px;
      padding: 0 3px;
      border-radius: 8px;
      background: var(--accent-2);
      color: var(--accent-ink);
      font-size: 10px;
      font-weight: 700;
      line-height: 15px;
      text-align: center;
    }

    #app { display: flex; flex-direction: column; height: 272px; }

    .view { display: none; flex-direction: column; height: 100%; overflow: hidden; }
    .view.active { display: flex; }

    /* ── Search view ── */
    #search-row {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      flex-shrink: 0;
    }
    #search-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      color: var(--ink);
      font-size: 13px;
      padding: 10px 12px;
      outline: none;
    }
    #search-input::placeholder { color: var(--muted-2); }
    #search-btn {
      width: 40px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: var(--accent-ink);
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    #search-btn svg { width: 18px; height: 18px; }

    .scroll-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
    }

    .empty-state {
      text-align: center;
      color: var(--muted-2);
      font-size: 13px;
      margin-top: 40px;
      padding: 0 30px;
      line-height: 1.5;
    }

    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      margin-bottom: 8px;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: 10px;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active { border-color: var(--accent); }

    .card-main { flex: 1; min-width: 0; }
    .card-name {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-sub {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 2px;
    }
    .card-chevron { width: 14px; height: 14px; color: var(--muted-2); flex-shrink: 0; }

    .add-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--accent-ink);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .add-btn:active { background: var(--accent-2); }
    .add-btn svg { width: 16px; height: 16px; }
    .add-btn.added { background: var(--surface); border: 1px solid var(--accent); color: var(--accent); }

    #menu-header {
      padding: 8px 12px 2px;
      flex-shrink: 0;
    }
    #menu-restaurant-name {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .spinner-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12.5px;
      gap: 8px;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--hairline);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .err-banner {
      margin: 0 12px 8px;
      padding: 8px 10px;
      background: #2a1a16;
      border: 1px solid #4a2a20;
      color: #e89e6a;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.4;
    }

    /* ── Cart view ── */
    #cart-list { flex: 1; overflow-y: auto; padding: 8px 12px; }
    .cart-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--hairline);
    }
    .cart-row-name { flex: 1; font-size: 13px; color: var(--ink); }
    .cart-row-price { font-size: 13px; color: var(--muted); }
    .cart-row-remove {
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: var(--muted-2);
      -webkit-tap-highlight-color: transparent;
    }
    .cart-row-remove svg { width: 14px; height: 14px; }

    #cart-footer {
      flex-shrink: 0;
      padding: 10px 14px 12px;
      border-top: 1px solid var(--hairline);
      background: #151d13;
    }
    #cart-total-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    #cart-note {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }

    /* ── Floating cart bar ── */
    #cart-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 14px;
      background: var(--accent);
      color: var(--accent-ink);
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    #cart-bar.show { display: flex; }
    #cart-bar-label { font-size: 13px; font-weight: 700; }
    #cart-bar-arrow { width: 16px; height: 16px; }
  </style>
</head>
<body>

<div id="top-bar">
  <a id="back-btn" href="/screen.html">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="10,3 5,8 10,13"></polyline>
    </svg>
    Screen
  </a>
  <div id="top-title">Food</div>
  <button id="cart-btn" title="Cart">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1"></circle>
      <circle cx="20" cy="21" r="1"></circle>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
    </svg>
    <span id="cart-badge">0</span>
  </button>
</div>

<div id="app">

  <!-- Search / results -->
  <div class="view active" id="view-search">
    <div id="search-row">
      <input id="search-input" type="text" placeholder="Search restaurants or cuisine…" autocomplete="off">
      <button id="search-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="7"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
    </div>
    <div class="scroll-list" id="results-list">
      <div class="empty-state">Search DoorDash for a restaurant or cuisine — like the Rabbit R1's food ordering, browse and build a cart right here.</div>
    </div>
  </div>

  <!-- Menu -->
  <div class="view" id="view-menu">
    <div id="menu-header">
      <div id="menu-restaurant-name">—</div>
    </div>
    <div class="scroll-list" id="menu-list"></div>
  </div>

  <!-- Cart -->
  <div class="view" id="view-cart">
    <div id="cart-list"></div>
    <div id="cart-footer">
      <div id="cart-total-row"><span>Total</span><span id="cart-total">$0.00</span></div>
      <div id="cart-note">This is a preview cart — checkout isn't wired up here yet. Say "place my order" to Frog to finish through voice.</div>
    </div>
  </div>

</div>

<div id="cart-bar">
  <div id="cart-bar-label">0 items · $0.00</div>
  <svg id="cart-bar-arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="6,3 11,8 6,13"></polyline>
  </svg>
</div>

<script>
  let currentRestaurant = null; // { id, name, url }
  let currentMenu = [];
  let cartItems = [];

  function esc(s) { return String(s == null ? '' : s).replace(/</g, '&lt;'); }
  function money(n) { return '$' + (parseFloat(n) || 0).toFixed(2); }

  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function updateCartBar() {
    const count = cartItems.reduce((n, i) => n + (i.quantity || 1), 0);
    const total = cartItems.reduce((sum, i) => sum + (parseFloat(i.price) || 0) * (i.quantity || 1), 0);
    const bar = document.getElementById('cart-bar');
    const badge = document.getElementById('cart-badge');
    if (count > 0) {
      bar.classList.add('show');
      document.getElementById('cart-bar-label').textContent = `${count} item${count === 1 ? '' : 's'} · ${money(total)}`;
      badge.style.display = 'flex';
      badge.textContent = count;
    } else {
      bar.classList.remove('show');
      badge.style.display = 'none';
    }
  }

  // ── Search ──────────────────────────────────────────────────────────────
  async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) return;
    const list = document.getElementById('results-list');
    list.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div>Searching DoorDash…</div>';

    try {
      const res = await fetch('/api/food/search?q=' + encodeURIComponent(q));
      const data = await res.json();
      if (!res.ok) {
        list.innerHTML = `<div class="err-banner">${esc(data.error || 'Search failed.')}</div>`;
        return;
      }
      if (!data.restaurants || data.restaurants.length === 0) {
        list.innerHTML = '<div class="empty-state">No restaurants found. Try a different search.</div>';
        return;
      }
      list.innerHTML = data.restaurants.map((r, i) => `
        <div class="card" data-idx="${i}">
          <div class="card-main">
            <div class="card-name">${esc(r.name)}</div>
            <div class="card-sub">${[r.rating ? '★ ' + esc(r.rating) : '', esc(r.deliveryTime || ''), esc(r.deliveryFee || '')].filter(Boolean).join(' · ') || 'DoorDash'}</div>
          </div>
          <svg class="card-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,3 11,8 6,13"></polyline></svg>
        </div>
      `).join('');
      list.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => selectRestaurant(data.restaurants[parseInt(card.dataset.idx)]));
      });
    } catch {
      list.innerHTML = '<div class="err-banner">Could not reach the server.</div>';
    }
  }

  document.getElementById('search-btn').addEventListener('click', doSearch);
  document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });

  // ── Menu ────────────────────────────────────────────────────────────────
  async function selectRestaurant(r) {
    showView('view-menu');
    document.getElementById('menu-restaurant-name').textContent = r.name;
    document.getElementById('menu-list').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div>Loading menu…</div>';

    try {
      const res = await fetch('/api/food/select', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: r.id, name: r.name, url: r.url }),
      });
      const data = await res.json();
      if (!res.ok) {
        document.getElementById('menu-list').innerHTML = `<div class="err-banner">${esc(data.error || 'Could not load menu.')}</div>`;
        return;
      }
      currentRestaurant = data.restaurant;
      currentMenu = data.menu || [];
      cartItems = [];
      updateCartBar();
      renderMenu();
    } catch {
      document.getElementById('menu-list').innerHTML = '<div class="err-banner">Could not reach the server.</div>';
    }
  }

  function renderMenu() {
    const list = document.getElementById('menu-list');
    if (currentMenu.length === 0) {
      list.innerHTML = '<div class="empty-state">No menu items found.</div>';
      return;
    }
    list.innerHTML = currentMenu.map((item, i) => `
      <div class="card">
        <div class="card-main">
          <div class="card-name">${esc(item.name)}</div>
          <div class="card-sub">${money(item.price)}</div>
        </div>
        <button class="add-btn" data-idx="${i}" title="Add">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        </button>
      </div>
    `).join('');
    list.querySelectorAll('.add-btn').forEach(btn => {
      btn.addEventListener('click', () => addItem(parseInt(btn.dataset.idx), btn));
    });
  }

  async function addItem(idx, btn) {
    const item = currentMenu[idx];
    btn.disabled = true;
    try {
      const res = await fetch('/api/food/cart/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ itemIndex: idx, item }),
      });
      const data = await res.json();
      if (!res.ok) {
        if (data.needsOptions) {
          alert(`"${item.name}" needs a choice (like size or protein) — add it by voice/SMS instead.`);
        } else {
          alert(data.error || 'Could not add item.');
        }
        btn.disabled = false;
        return;
      }
      cartItems = data.items || [];
      updateCartBar();
      btn.classList.add('added');
      setTimeout(() => { btn.classList.remove('added'); btn.disabled = false; }, 600);
    } catch {
      alert('Could not reach the server.');
      btn.disabled = false;
    }
  }

  // ── Cart ────────────────────────────────────────────────────────────────
  async function loadCart() {
    showView('view-cart');
    const list = document.getElementById('cart-list');
    list.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div>Loading cart…</div>';
    try {
      const res = await fetch('/api/food/cart');
      const data = await res.json();
      cartItems = data.items || [];
      renderCart();
      updateCartBar();
    } catch {
      list.innerHTML = '<div class="err-banner">Could not reach the server.</div>';
    }
  }

  function renderCart() {
    const list = document.getElementById('cart-list');
    if (cartItems.length === 0) {
      list.innerHTML = '<div class="empty-state">Your cart is empty. Go back and add something.</div>';
    } else {
      list.innerHTML = cartItems.map(item => `
        <div class="cart-row" data-id="${esc(item.id)}">
          <div class="cart-row-name">${item.quantity > 1 ? item.quantity + '× ' : ''}${esc(item.name)}</div>
          <div class="cart-row-price">${money((parseFloat(item.price) || 0) * (item.quantity || 1))}</div>
          <button class="cart-row-remove" title="Remove">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
      `).join('');
      list.querySelectorAll('.cart-row-remove').forEach(btn => {
        btn.addEventListener('click', () => removeItem(btn.closest('.cart-row').dataset.id));
      });
    }
    const total = cartItems.reduce((sum, i) => sum + (parseFloat(i.price) || 0) * (i.quantity || 1), 0);
    document.getElementById('cart-total').textContent = money(total);
  }

  async function removeItem(itemId) {
    try {
      const res = await fetch('/api/food/cart/remove', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ itemId }),
      });
      const data = await res.json();
      cartItems = data.items || [];
      renderCart();
      updateCartBar();
    } catch {}
  }

  document.getElementById('cart-btn').addEventListener('click', loadCart);
  document.getElementById('cart-bar').addEventListener('click', loadCart);

  // Restore state on load (in case a restaurant/cart is already active from voice/SMS)
  (async () => {
    try {
      const res = await fetch('/api/food/status');
      const data = await res.json();
      if (data.restaurant) {
        const cartRes = await fetch('/api/food/cart');
        const cartData = await cartRes.json();
        cartItems = cartData.items || [];
        updateCartBar();
      }
    } catch {}
  })();
</script>
</body>
</html>
