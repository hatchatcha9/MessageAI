<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1.0">
  <title>frog — Food</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ground: #10160f;
      --surface: #1a2318;
      --hairline: #2a3524;
      --ink: #eef2e6;
      --muted: #7c8a72;
      --muted-2: #55604c;
      --accent: #9ee85a;
      --accent-ink: #16220c;
      --accent-2: #e8b64a;
    }

    body {
      width: 480px;
      height: 320px;
      background: var(--ground);
      color: var(--ink);
      font-family: -apple-system, 'Segoe UI', 'Noto Sans', sans-serif;
      font-size: 14px;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 14px;
      background: #151d13;
      border-bottom: 1px solid var(--hairline);
      flex-shrink: 0;
    }

    #back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 12px 8px;
      min-height: 44px;
      -webkit-tap-highlight-color: transparent;
      background: none;
      border: none;
      font-family: inherit;
      cursor: pointer;
    }
    #back-btn:active { opacity: 0.6; }
    #back-btn svg { width: 18px; height: 18px; }

    #top-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
    }

    #cart-btn {
      position: relative;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--accent);
      background: none;
      border: none;
      -webkit-tap-highlight-color: transparent;
    }
    #cart-btn svg { width: 19px; height: 19px; }
    #cart-badge {
      display: none;
      position: absolute;
      top: 4px; right: 2px;
      min-width: 15px; height: 15px;
      padding: 0 3px;
      border-radius: 8px;
      background: var(--accent-2);
      color: var(--accent-ink);
      font-size: 10px;
      font-weight: 700;
      line-height: 15px;
      text-align: center;
    }

    #app { display: flex; flex-direction: column; height: 272px; }

    .view { display: none; flex-direction: column; height: 100%; overflow: hidden; }
    .view.active { display: flex; }

    /* ── Search view ── */
    #search-row {
      display: flex;
      gap: 8px;
      padding: 10px 12px;
      flex-shrink: 0;
    }
    #mic-btn {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: var(--accent-ink);
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      -webkit-tap-highlight-color: transparent;
    }
    #mic-btn svg { width: 17px; height: 17px; }
    #mic-btn.listening {
      background: var(--accent-2);
      animation: mic-pulse 1s ease-in-out infinite;
    }
    @keyframes mic-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.65; } }

    #browse-btn {
      width: 40px;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      color: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    #browse-btn svg { width: 17px; height: 17px; }

    .genre-hint {
      text-align: center;
      color: var(--muted-2);
      font-size: 11.5px;
      padding: 4px 4px 10px;
    }
    .genre-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }
    .genre-chip {
      padding: 11px 4px;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: 10px;
      color: var(--ink);
      font-size: 12.5px;
      font-weight: 600;
      text-align: center;
      -webkit-tap-highlight-color: transparent;
    }
    .genre-chip:active { border-color: var(--accent); color: var(--accent); }

    .scroll-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 12px 12px;
    }

    .empty-state {
      text-align: center;
      color: var(--muted-2);
      font-size: 13px;
      margin-top: 40px;
      padding: 0 30px;
      line-height: 1.5;
    }

    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      margin-bottom: 8px;
      background: var(--surface);
      border: 1px solid var(--hairline);
      border-radius: 10px;
      -webkit-tap-highlight-color: transparent;
    }
    .card:active { border-color: var(--accent); }

    .card-main { flex: 1; min-width: 0; }

    .size-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      width: 100%;
    }
    .size-btn {
      flex: 1;
      padding: 8px 4px;
      background: var(--ground);
      border: 1px solid var(--hairline);
      border-radius: 8px;
      color: var(--ink);
      font-family: inherit;
      font-size: 11px;
      font-weight: 600;
      text-align: center;
      line-height: 1.35;
      -webkit-tap-highlight-color: transparent;
    }
    .size-btn:active { border-color: var(--accent); color: var(--accent); }
    .card-name {
      font-size: 13.5px;
      font-weight: 600;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .card-sub {
      font-size: 11.5px;
      color: var(--muted);
      margin-top: 2px;
    }
    .card-chevron { width: 14px; height: 14px; color: var(--muted-2); flex-shrink: 0; }

    .add-btn {
      width: 30px; height: 30px;
      border-radius: 50%;
      background: var(--accent);
      color: var(--accent-ink);
      border: none;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .add-btn:active { background: var(--accent-2); }
    .add-btn svg { width: 16px; height: 16px; }
    .add-btn.added { background: var(--surface); border: 1px solid var(--accent); color: var(--accent); }

    #menu-header {
      padding: 8px 12px 2px;
      flex-shrink: 0;
    }
    #menu-restaurant-name {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .spinner-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 12.5px;
      gap: 8px;
    }
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--hairline);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .err-banner {
      margin: 0 12px 8px;
      padding: 8px 10px;
      background: #2a1a16;
      border: 1px solid #4a2a20;
      color: #e89e6a;
      border-radius: 8px;
      font-size: 12px;
      line-height: 1.4;
    }

    /* ── Cart view ── */
    #cart-header {
      padding: 8px 12px 2px;
      flex-shrink: 0;
    }
    #cart-restaurant-name {
      font-size: 15px;
      font-weight: 700;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    #cart-list { flex: 1; overflow-y: auto; padding: 8px 12px; }
    .cart-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--hairline);
    }
    .cart-row-info { flex: 1; min-width: 0; }
    .cart-row-name { font-size: 13px; color: var(--ink); }
    .cart-row-variant { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
    .cart-row-price { font-size: 13px; color: var(--muted); }
    .cart-row-remove {
      width: 26px; height: 26px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; color: var(--muted-2);
      -webkit-tap-highlight-color: transparent;
    }
    .cart-row-remove svg { width: 14px; height: 14px; }

    #cart-footer {
      flex-shrink: 0;
      padding: 10px 14px 12px;
      border-top: 1px solid var(--hairline);
      background: #151d13;
    }
    #cart-total-row {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }
    #cart-note {
      font-size: 11px;
      color: var(--muted);
      line-height: 1.4;
    }

    /* ── Floating cart bar ── */
    #cart-bar {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 14px;
      background: var(--accent);
      color: var(--accent-ink);
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    #cart-bar.show { display: flex; }
    #cart-bar-label { font-size: 13px; font-weight: 700; }
    #cart-bar-arrow { width: 16px; height: 16px; }
  </style>
</head>
<body>

<div id="top-bar">
  <button id="back-btn">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="10,3 5,8 10,13"></polyline>
    </svg>
    <span id="back-btn-label">Screen</span>
  </button>
  <div id="top-title">Food</div>
  <button id="cart-btn" title="Cart">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="21" r="1"></circle>
      <circle cx="20" cy="21" r="1"></circle>
      <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
    </svg>
    <span id="cart-badge">0</span>
  </button>
</div>

<div id="app">

  <!-- Search / results -->
  <div class="view active" id="view-search">
    <div id="search-row">
      <button id="mic-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
          <line x1="12" y1="19" x2="12" y2="23"></line>
        </svg>
        <span id="mic-btn-label">Say a restaurant or cuisine</span>
      </button>
      <button id="browse-btn" title="Browse cuisines">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1.5"></rect>
          <rect x="14" y="3" width="7" height="7" rx="1.5"></rect>
          <rect x="3" y="14" width="7" height="7" rx="1.5"></rect>
          <rect x="14" y="14" width="7" height="7" rx="1.5"></rect>
        </svg>
      </button>
    </div>
    <div class="scroll-list" id="results-list"></div>
  </div>

  <!-- Menu -->
  <div class="view" id="view-menu">
    <div id="menu-header">
      <div id="menu-restaurant-name">—</div>
    </div>
    <div class="scroll-list" id="menu-list"></div>
  </div>

  <!-- Cart -->
  <div class="view" id="view-cart">
    <div id="cart-header">
      <div id="cart-restaurant-name">—</div>
    </div>
    <div id="cart-list"></div>
    <div id="cart-footer">
      <div id="cart-total-row"><span>Total</span><span id="cart-total">$0.00</span></div>
      <div id="cart-note">This is a preview cart — checkout isn't wired up here yet. Say "place my order" to Frog to finish through voice.</div>
    </div>
  </div>

</div>

<div id="cart-bar">
  <div id="cart-bar-label">0 items · $0.00</div>
  <svg id="cart-bar-arrow" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <polyline points="6,3 11,8 6,13"></polyline>
  </svg>
</div>

<script>
  let currentRestaurant = null; // { id, name, url }
  let currentMenu = [];
  let cartItems = [];

  // Used both in text content and interpolated inside double-quoted HTML attributes
  // (e.g. data-id="${esc(item.id)}") — escaping only '<' left a '"' in the value free
  // to break out of the attribute and inject arbitrary markup, so quotes and '&' are
  // escaped too now.
  function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }
  function money(n) { return '$' + (parseFloat(n) || 0).toFixed(2); }

  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    // back-btn always steps up one level in search -> menu -> cart, only
    // leaving the page (to screen.html) from the top-level search view.
    document.getElementById('back-btn-label').textContent = id === 'view-search' ? 'Screen' : 'Back';
  }

  document.getElementById('back-btn').addEventListener('click', () => {
    const active = document.querySelector('.view.active').id;
    if (active === 'view-cart') {
      showView(currentRestaurant ? 'view-menu' : 'view-search');
    } else if (active === 'view-menu') {
      showView('view-search');
    } else {
      window.location.href = '/screen.html';
    }
  });

  function updateCartBar() {
    const count = cartItems.reduce((n, i) => n + (i.quantity || 1), 0);
    const total = cartItems.reduce((sum, i) => sum + (parseFloat(i.price) || 0) * (i.quantity || 1), 0);
    const bar = document.getElementById('cart-bar');
    const badge = document.getElementById('cart-badge');
    if (count > 0) {
      bar.classList.add('show');
      document.getElementById('cart-bar-label').textContent = `${count} item${count === 1 ? '' : 's'} · ${money(total)}`;
      badge.style.display = 'flex';
      badge.textContent = count;
    } else {
      bar.classList.remove('show');
      badge.style.display = 'none';
    }
  }

  // ── Genre picker ────────────────────────────────────────────────────────
  // This kiosk has no on-screen keyboard, so typing a search query isn't practical —
  // tapping a cuisine is the fast path. Kept to 12 (3x4 grid) so it fits within
  // results-list's ~200px of available height without depending on scroll gestures
  // working on this hardware (the resistive digitizer reports as a plain mouse, and
  // native touch-scroll needs real Touch events the OS never generates here).
  const GENRES = ['Pizza', 'Burgers', 'Mexican', 'Chinese', 'Sushi', 'Italian',
                  'Thai', 'Indian', 'Chicken', 'BBQ', 'Breakfast', 'Dessert'];

  function genreGridHTML() {
    return `
      <div class="genre-hint">No keyboard — tap a cuisine to search:</div>
      <div class="genre-grid">
        ${GENRES.map(g => `<button class="genre-chip" data-genre="${esc(g)}">${esc(g)}</button>`).join('')}
      </div>
    `;
  }
  function wireGenreChips(root) {
    root.querySelectorAll('.genre-chip').forEach(btn => {
      btn.addEventListener('click', () => doSearch(btn.dataset.genre));
    });
  }
  function showGenreGrid() {
    const list = document.getElementById('results-list');
    list.innerHTML = genreGridHTML();
    wireGenreChips(list);
  }
  // Appends below existing content (e.g. a "no results" message) instead of
  // replacing it, so the user can immediately try another cuisine.
  function showGenreGridBelow() {
    const list = document.getElementById('results-list');
    list.insertAdjacentHTML('beforeend', genreGridHTML());
    wireGenreChips(list);
  }
  document.getElementById('browse-btn').addEventListener('click', showGenreGrid);

  // ── Search ──────────────────────────────────────────────────────────────
  // Sequence token so a slower, older search request can't land after a newer one and
  // overwrite the results list with stale data — e.g. searching "pizza" then quickly
  // "sushi" could otherwise show pizza results last if that request happened to
  // resolve second.
  let _searchSeq = 0;
  async function doSearch(query) {
    const q = (query || '').trim();
    if (!q) return;
    const seq = ++_searchSeq;
    const list = document.getElementById('results-list');
    list.innerHTML = `<div class="spinner-wrap"><div class="spinner"></div>Searching for "${esc(q)}"…</div>`;

    try {
      const res = await fetch('/api/food/search?q=' + encodeURIComponent(q));
      const data = await res.json();
      if (seq !== _searchSeq) return; // a newer search started while this one was in flight
      if (!res.ok) {
        list.innerHTML = `<div class="err-banner">${esc(data.error || 'Search failed.')}</div>`;
        return;
      }
      if (!data.restaurants || data.restaurants.length === 0) {
        list.innerHTML = '<div class="empty-state">No restaurants found. Try a different search.</div>';
        showGenreGridBelow();
        return;
      }
      list.innerHTML = data.restaurants.map((r, i) => `
        <div class="card" data-idx="${i}">
          <div class="card-main">
            <div class="card-name">${esc(r.name)}</div>
            <div class="card-sub">${[r.rating ? '★ ' + esc(r.rating) : '', esc(r.deliveryTime || ''), esc(r.deliveryFee || '')].filter(Boolean).join(' · ') || 'DoorDash'}</div>
          </div>
          <svg class="card-chevron" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6,3 11,8 6,13"></polyline></svg>
        </div>
      `).join('');
      list.querySelectorAll('.card').forEach(card => {
        card.addEventListener('click', () => selectRestaurant(data.restaurants[parseInt(card.dataset.idx)]));
      });
    } catch {
      if (seq !== _searchSeq) return;
      list.innerHTML = '<div class="err-banner">Could not reach the server.</div>';
    }
  }

  // ── Dictate-to-search (no on-screen keyboard on this kiosk) ───────────────
  // Taps the physical mic via the same server-side mechanism screen.html's
  // tap-to-speak uses, but voice_loop.py records+transcribes WITHOUT invoking Claude
  // or speaking a response — it just hands the text back here via polling.
  let _dictatePoll = null;
  const micBtn = document.getElementById('mic-btn');
  const micBtnLabel = document.getElementById('mic-btn-label');

  async function startDictateSearch() {
    if (_dictatePoll) return; // already listening
    micBtn.classList.add('listening');
    micBtnLabel.textContent = 'Listening…';
    const list = document.getElementById('results-list');
    list.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div>Listening — say a restaurant or cuisine…</div>';

    try {
      await fetch('/api/dictate/start', { method: 'POST' });
    } catch {
      stopDictateListening();
      list.innerHTML = '<div class="err-banner">Could not reach the server.</div>';
      showGenreGridBelow();
      return;
    }

    let attempts = 0;
    const maxAttempts = 40; // ~20s at 500ms — generous for silence-wait + transcription time
    _dictatePoll = setInterval(async () => {
      attempts++;
      try {
        const res = await fetch('/api/dictate/result');
        const data = await res.json();
        if (data.ready) {
          stopDictateListening();
          if (data.text) {
            doSearch(data.text);
          } else {
            list.innerHTML = '<div class="empty-state">Didn\'t catch that — try again.</div>';
            showGenreGridBelow();
          }
          return;
        }
      } catch {
        // transient — keep polling until maxAttempts
      }
      if (attempts >= maxAttempts) {
        stopDictateListening();
        list.innerHTML = '<div class="err-banner">Timed out waiting for speech.</div>';
        showGenreGridBelow();
      }
    }, 500);
  }

  function stopDictateListening() {
    if (_dictatePoll) { clearInterval(_dictatePoll); _dictatePoll = null; }
    micBtn.classList.remove('listening');
    micBtnLabel.textContent = 'Say a restaurant or cuisine';
  }

  micBtn.addEventListener('click', startDictateSearch);

  // ── Menu ────────────────────────────────────────────────────────────────
  // Same stale-response guard as doSearch() — tapping restaurant A then B before A's
  // /api/food/select resolves could otherwise let A's slower response land last and
  // overwrite the UI with the wrong restaurant's menu.
  let _selectSeq = 0;
  async function selectRestaurant(r) {
    const seq = ++_selectSeq;
    showView('view-menu');
    document.getElementById('menu-restaurant-name').textContent = r.name;
    document.getElementById('menu-list').innerHTML = '<div class="spinner-wrap"><div class="spinner"></div>Loading menu…</div>';

    try {
      const res = await fetch('/api/food/select', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id: r.id, name: r.name, url: r.url }),
      });
      const data = await res.json();
      if (seq !== _selectSeq) return; // a newer selection started while this one was in flight
      if (!res.ok) {
        document.getElementById('menu-list').innerHTML = `<div class="err-banner">${esc(data.error || 'Could not load menu.')}</div>`;
        return;
      }
      currentRestaurant = data.restaurant;
      currentMenu = data.menu || [];
      cartItems = [];
      updateCartBar();
      renderMenu();
    } catch {
      if (seq !== _selectSeq) return;
      document.getElementById('menu-list').innerHTML = '<div class="err-banner">Could not reach the server.</div>';
    }
  }

  function renderMenu() {
    const list = document.getElementById('menu-list');
    if (currentMenu.length === 0) {
      list.innerHTML = '<div class="empty-state">No menu items found.</div>';
      return;
    }
    // Some restaurants (e.g. Costa Vida's "Small Salad" / "Salads") list size
    // variants as separate menu entries; server.js groups those into one item with
    // a `sizes` list so it shows as a single card with a size picker here instead
    // of two unrelated-looking rows.
    list.innerHTML = currentMenu.map((item, i) => {
      if (item.sizes && item.sizes.length > 1) {
        return `
          <div class="card">
            <div class="card-main">
              <div class="card-name">${esc(item.name)}</div>
              <div class="card-sub">Choose a size</div>
              <div class="size-row">
                ${item.sizes.map((s, si) => `
                  <button class="size-btn" data-idx="${i}" data-size="${si}">${esc(s.label)}<br>${money(s.price)}</button>
                `).join('')}
              </div>
            </div>
          </div>
        `;
      }
      return `
        <div class="card">
          <div class="card-main">
            <div class="card-name">${esc(item.name)}</div>
            <div class="card-sub">${money(item.price)}</div>
          </div>
          <button class="add-btn" data-idx="${i}" title="Add">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </button>
        </div>
      `;
    }).join('');
    list.querySelectorAll('.add-btn').forEach(btn => {
      const idx = parseInt(btn.dataset.idx);
      btn.addEventListener('click', () => addItem(idx, currentMenu[idx], btn));
    });
    list.querySelectorAll('.size-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        const size = currentMenu[idx].sizes[parseInt(btn.dataset.size)];
        addItem(size.index, size, btn);
      });
    });
  }

  // realIndex is the item's true position in DoorDash's own menu (used to actually
  // click/add it) — for a plain item that's its array index in currentMenu; for a
  // grouped size variant it's that size's own index, NOT the group's.
  async function addItem(realIndex, item, btn) {
    const isSizeBtn = btn.classList.contains('size-btn');
    const origHTML = isSizeBtn ? btn.innerHTML : null;
    btn.disabled = true;
    try {
      const res = await fetch('/api/food/cart/add', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ itemIndex: realIndex, item }),
      });
      const data = await res.json();
      if (!res.ok) {
        if (data.needsOptions) {
          alert(`"${item.name}" needs a choice (like size or protein) — add it by voice/SMS instead.`);
        } else {
          alert(data.error || 'Could not add item.');
        }
        btn.disabled = false;
        return;
      }
      cartItems = data.items || [];
      updateCartBar();
      if (isSizeBtn) {
        btn.textContent = 'Added ✓';
        setTimeout(() => { btn.innerHTML = origHTML; btn.disabled = false; }, 600);
      } else {
        btn.classList.add('added');
        setTimeout(() => { btn.classList.remove('added'); btn.disabled = false; }, 600);
      }
    } catch {
      alert('Could not reach the server.');
      btn.disabled = false;
    }
  }

  // ── Cart ────────────────────────────────────────────────────────────────
  async function loadCart() {
    showView('view-cart');
    const list = document.getElementById('cart-list');
    list.innerHTML = '<div class="spinner-wrap"><div class="spinner"></div>Loading cart…</div>';
    try {
      const res = await fetch('/api/food/cart');
      const data = await res.json();
      cartItems = data.items || [];
      document.getElementById('cart-restaurant-name').textContent = data.restaurant ? data.restaurant.name : '—';
      renderCart();
      updateCartBar();
    } catch {
      list.innerHTML = '<div class="err-banner">Could not reach the server.</div>';
    }
  }

  function renderCart() {
    const list = document.getElementById('cart-list');
    if (cartItems.length === 0) {
      list.innerHTML = '<div class="empty-state">Your cart is empty. Go back and add something.</div>';
    } else {
      list.innerHTML = cartItems.map(item => `
        <div class="cart-row" data-id="${esc(item.id)}">
          <div class="cart-row-info">
            <div class="cart-row-name">${item.quantity > 1 ? item.quantity + '× ' : ''}${esc(item.name)}</div>
            ${item.label ? `<div class="cart-row-variant">${esc(item.label)}</div>` : ''}
          </div>
          <div class="cart-row-price">${money((parseFloat(item.price) || 0) * (item.quantity || 1))}</div>
          <button class="cart-row-remove" title="Remove">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
          </button>
        </div>
      `).join('');
      list.querySelectorAll('.cart-row-remove').forEach(btn => {
        btn.addEventListener('click', () => removeItem(btn.closest('.cart-row').dataset.id));
      });
    }
    const total = cartItems.reduce((sum, i) => sum + (parseFloat(i.price) || 0) * (i.quantity || 1), 0);
    document.getElementById('cart-total').textContent = money(total);
  }

  async function removeItem(itemId) {
    try {
      const res = await fetch('/api/food/cart/remove', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ itemId }),
      });
      const data = await res.json();
      cartItems = data.items || [];
      renderCart();
      updateCartBar();
    } catch {}
  }

  document.getElementById('cart-btn').addEventListener('click', loadCart);
  document.getElementById('cart-bar').addEventListener('click', loadCart);

  // ── Drag-to-scroll ──────────────────────────────────────────────────────
  // The GeeekPi touchscreen is a resistive digitizer reported to X11 as a plain
  // mouse pointer (no HTML5 touch events), so a finger drag never triggers native
  // overflow-y:auto scrolling here — same root cause as the other kiosk pages, but
  // those don't also have tappable rows inside the scrolling area (restaurant
  // cards, menu items). A plain copy of that pattern would misfire: ending a
  // scroll-drag over a card would otherwise still fire that card's click. This
  // tracks how far each gesture actually moved and, above a small threshold,
  // suppresses the click that would otherwise land on whatever's under the
  // finger at release.
  function enableDragScroll(el) {
    const DRAG_THRESHOLD = 6; // px
    let dragging = false, startY = 0, startScroll = 0, moved = false;

    el.addEventListener('pointerdown', e => {
      dragging = true;
      moved = false;
      startY = e.clientY;
      startScroll = el.scrollTop;
    });
    el.addEventListener('pointermove', e => {
      if (!dragging) return;
      const dy = e.clientY - startY;
      if (Math.abs(dy) > DRAG_THRESHOLD) moved = true;
      el.scrollTop = startScroll - dy;
    });
    const stopDrag = () => { dragging = false; };
    el.addEventListener('pointerup', stopDrag);
    el.addEventListener('pointercancel', stopDrag);
    el.addEventListener('pointerleave', stopDrag);

    // Capture phase so this runs before any card/button's own click listener.
    el.addEventListener('click', e => {
      if (moved) { e.stopPropagation(); e.preventDefault(); }
    }, true);
  }
  document.querySelectorAll('.scroll-list, #cart-list').forEach(enableDragScroll);

  showGenreGrid();

  // Restore state on load (in case a restaurant/cart is already active from voice/SMS)
  (async () => {
    try {
      const res = await fetch('/api/food/status');
      const data = await res.json();
      if (data.restaurant) {
        const cartRes = await fetch('/api/food/cart');
        const cartData = await cartRes.json();
        cartItems = cartData.items || [];
        updateCartBar();
      }
    } catch {}
  })();
</script>
</body>
</html>
