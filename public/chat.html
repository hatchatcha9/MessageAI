<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=480, initial-scale=1.0">
  <title>frog — Chat</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 480px;
      height: 100vh;
      background: #0a0a0f;
      color: #e2e8f0;
      font-family: 'Segoe UI', system-ui, sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 48px;
      padding: 0 14px;
      background: #0d0d18;
      border-bottom: 1px solid #1e1e2e;
      flex-shrink: 0;
    }

    #back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: #6ee7f7;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 10px 4px;
    }
    #back-btn:active { opacity: 0.6; }
    #back-btn svg { width: 16px; height: 16px; }

    #top-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #6ee7f7;
    }

    #clear-btn {
      background: none;
      border: 1px solid #2a2a3e;
      border-radius: 6px;
      color: #4a5568;
      cursor: pointer;
      font-family: inherit;
      font-size: 11px;
      letter-spacing: 1px;
      padding: 6px 12px;
      text-transform: uppercase;
      transition: all 0.15s;
    }
    #clear-btn:hover  { border-color: #f87171; color: #f87171; }
    #clear-btn:active { opacity: 0.6; }

    /* ── Message list ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #1e1e2e; border-radius: 2px; }

    /* ── Bubble base ── */
    .bubble {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 13px;
      line-height: 1.5;
      word-break: break-word;
    }

    /* User bubble — right aligned, cyan tint */
    .bubble.user {
      align-self: flex-end;
      background: #0d2b35;
      border: 1px solid #1a4a5e;
      color: #a8eef7;
      border-bottom-right-radius: 4px;
    }

    /* Frog bubble — left aligned, dark */
    .bubble.frog {
      align-self: flex-start;
      background: #10101a;
      border: 1px solid #1e1e2e;
      color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }

    /* Thinking bubble — animated */
    .bubble.thinking {
      align-self: flex-start;
      background: #10101a;
      border: 1px solid #1e1e2e;
      padding: 12px 18px;
    }

    .dot-row {
      display: flex;
      gap: 5px;
      align-items: center;
    }
    .dot-row span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #a78bfa;
      display: inline-block;
      animation: pulse 1s ease-in-out infinite;
    }
    .dot-row span:nth-child(2) { animation-delay: 0.2s; }
    .dot-row span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.8); }
      50%       { opacity: 1;   transform: scale(1); }
    }

    /* Command tag badge */
    .cmd-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 2px 7px;
      border-radius: 4px;
      margin-bottom: 6px;
      background: #1a1230;
      color: #a78bfa;
      border: 1px solid #2a1e4a;
    }
    .cmd-badge.weather  { background: #0d2030; color: #6ee7f7; border-color: #1a3a4a; }
    .cmd-badge.reminder { background: #1a2000; color: #86efac; border-color: #2a3a0a; }
    .cmd-badge.timer    { background: #1a2000; color: #86efac; border-color: #2a3a0a; }
    .cmd-badge.news     { background: #200d10; color: #fca5a5; border-color: #3a1a1a; }
    .cmd-badge.joke     { background: #1a1a00; color: #fde68a; border-color: #3a3a00; }
    .cmd-badge.define   { background: #0d0d20; color: #c4b5fd; border-color: #1a1a3a; }
    .cmd-badge.wiki     { background: #0d0d20; color: #c4b5fd; border-color: #1a1a3a; }
    .cmd-badge.camera   { background: #200d20; color: #f0abfc; border-color: #3a1a3a; }
    .cmd-badge.forecast { background: #0d2030; color: #6ee7f7; border-color: #1a3a4a; }
    .cmd-badge.math     { background: #201500; color: #fcd34d; border-color: #3a2500; }
    .cmd-badge.stock    { background: #001a0d; color: #6ee7a0; border-color: #003a1a; }

    /* System message */
    .sys-msg {
      align-self: center;
      font-size: 11px;
      color: #374151;
      letter-spacing: 0.5px;
      padding: 2px 0;
    }

    /* ── Input area ── */
    #input-area {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #0d0d18;
      border-top: 1px solid #1e1e2e;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      background: #111120;
      border: 1px solid #1e1e2e;
      border-radius: 10px;
      color: #e2e8f0;
      font-family: inherit;
      font-size: 13px;
      outline: none;
      padding: 10px 14px;
      resize: none;
      transition: border-color 0.15s;
      height: 42px;
      line-height: 1.4;
    }
    #msg-input:focus  { border-color: #6ee7f7; }
    #msg-input::placeholder { color: #374151; }

    #send-btn {
      width: 42px;
      height: 42px;
      background: #6ee7f7;
      border: none;
      border-radius: 10px;
      color: #0a0a0f;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, opacity 0.15s;
    }
    #send-btn:hover  { background: #a8eef7; }
    #send-btn:active { opacity: 0.7; }
    #send-btn:disabled { background: #1e1e2e; cursor: not-allowed; }
    #send-btn:disabled svg { color: #374151; }
    #send-btn svg { width: 18px; height: 18px; }
  </style>
</head>
<body>

<!-- Header -->
<div id="top-bar">
  <a id="back-btn" href="/screen.html">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="10,3 5,8 10,13"></polyline>
    </svg>
    Screen
  </a>
  <div id="top-title">Chat</div>
  <button id="clear-btn">Clear</button>
</div>

<!-- Messages -->
<div id="messages">
  <div class="sys-msg">frog is listening — type anything</div>
</div>

<!-- Input -->
<div id="input-area">
  <textarea id="msg-input" placeholder="Say something..." rows="1" autocomplete="off" spellcheck="false"></textarea>
  <button id="send-btn" title="Send">
    <svg viewBox="0 0 16 16" fill="currentColor">
      <path d="M2 13.5L14 8 2 2.5v4l8 1.5-8 1.5z"/>
    </svg>
  </button>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl    = document.getElementById('msg-input');
  const sendBtn    = document.getElementById('send-btn');

  // ── Command label map ──────────────────────────────────────────────────────
  const CMD_LABELS = {
    weather:  'Weather',
    forecast: 'Forecast',
    reminder: 'Reminder set',
    timer:    'Timer set',
    news:     'News',
    joke:     'Joke',
    define:   'Dictionary',
    wiki:     'Wikipedia',
    camera:   'Camera',
    math:     'Math',
    stock:    'Stock',
    calendar: 'Calendar',
    spotify:  'Spotify',
  };

  // ── Scroll to bottom ───────────────────────────────────────────────────────
  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  // ── Add a bubble ───────────────────────────────────────────────────────────
  function addBubble(role, text, actions = []) {
    const div = document.createElement('div');
    div.className = `bubble ${role}`;

    // Show command badges above frog responses
    if (role === 'frog' && actions.length) {
      for (const a of actions) {
        const badge = document.createElement('div');
        const key = a.type || '';
        badge.className = `cmd-badge ${key}`;
        badge.textContent = CMD_LABELS[key] || key.toUpperCase();
        div.appendChild(badge);
        div.appendChild(document.createElement('br'));
      }
    }

    const textNode = document.createElement('span');
    textNode.textContent = text;
    div.appendChild(textNode);

    messagesEl.appendChild(div);
    scrollBottom();
    return div;
  }

  function addThinking() {
    const div = document.createElement('div');
    div.className = 'bubble thinking';
    div.innerHTML = '<div class="dot-row"><span></span><span></span><span></span></div>';
    messagesEl.appendChild(div);
    scrollBottom();
    return div;
  }

  function addSys(text) {
    const div = document.createElement('div');
    div.className = 'sys-msg';
    div.textContent = text;
    messagesEl.appendChild(div);
    scrollBottom();
  }

  // ── Send message ───────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;

    inputEl.value = '';
    inputEl.style.height = '42px';
    sendBtn.disabled = true;

    addBubble('user', text);
    const thinking = addThinking();

    try {
      const res = await fetch('/api/voice', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: text }),
      });

      thinking.remove();

      if (!res.ok) {
        addSys('Server error — is frog running?');
        return;
      }

      const data = await res.json();
      const reply   = data.response || '(no response)';
      const actions = data.actions  || [];

      addBubble('frog', reply, actions);
    } catch (e) {
      thinking.remove();
      addSys('Could not reach server — make sure node server.js is running.');
    } finally {
      sendBtn.disabled = false;
      inputEl.focus();
    }
  }

  // ── Event listeners ────────────────────────────────────────────────────────
  sendBtn.addEventListener('click', sendMessage);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // Auto-resize textarea (up to ~3 lines)
  inputEl.addEventListener('input', () => {
    inputEl.style.height = '42px';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 90) + 'px';
  });

  document.getElementById('clear-btn').addEventListener('click', async () => {
    messagesEl.innerHTML = '';
    try {
      await fetch('/api/voice/clear', { method: 'POST' });
      addSys('Conversation cleared');
    } catch {
      addSys('Conversation cleared (server unreachable)');
    }
  });

  inputEl.focus();
</script>
</body>
</html>
